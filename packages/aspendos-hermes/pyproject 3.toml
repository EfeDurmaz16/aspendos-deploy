[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aspendos-hermes"
version = "0.1.0"
description = "Aspendos governance middleware for Hermes Agent — FIDES signing + AGIT audit + reversibility"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
keywords = ["hermes", "agent", "governance", "fides", "agit", "reversibility", "aspendos"]
dependencies = [
    "cryptography>=42.0",
]

[project.urls]
Homepage = "https://aspendos.dev"
Repository = "https://github.com/aspendos/aspendos-hermes"
