<!--
  YULA — Monochrome Mark (theme-adaptive)
  Uses currentColor everywhere — inherits from parent. For contexts
  where the brand accent would clash (app icons, high-contrast,
  print, small favicons, OS theme chrome).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" fill="none">
  <path d="M 4 40 A 28 28 0 0 1 60 40" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
  <path d="M 12 40 A 20 20 0 0 1 52 40" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.72" />
  <path d="M 20 40 A 12 12 0 0 1 44 40 Z" fill="currentColor" />
</svg>
