<!--
  A · Aspendos Cavea
  The distinctive half-circle of the Aspendos Roman theater: semicircular
  seating tiers facing a rectangular stage. The world's best-preserved
  Roman cavea. Reads as "audience witnessing / many heard, same stage" —
  maps to both the council (many models) and multi-surface (many
  channels, one agent) narratives. Brand-ownable: no other SaaS uses this.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer cavea arc -->
  <path d="M 4 40 A 28 28 0 0 1 60 40" stroke-width="4" />
  <!-- Middle tier -->
  <path d="M 12 40 A 20 20 0 0 1 52 40" stroke-width="3" opacity="0.72" />
  <!-- Inner tier -->
  <path d="M 20 40 A 12 12 0 0 1 44 40" stroke-width="2.5" opacity="0.45" />
  <!-- Stage floor -->
  <rect x="24" y="38" width="16" height="4" rx="0.5" fill="currentColor" stroke="none" />
</svg>
