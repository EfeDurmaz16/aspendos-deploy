<!--
  E · Cavea + Yula (torch/flame)
  Aspendos amphitheater cavea (tiered semicircle + stage) with a minimal
  upward flame rising from stage center. Semantic merge:
    - Aspendos (Anatolian heritage, the theater itself)
    - yula (Old Turkish: torch/flame/light — Kutadgu Bilig 11th c.)
    - Product (illuminates actions = FIDES+AGIT proof visibility)
  The flame at center is also the "spotlight on the stage" — every action
  is lit and witnessed by the audience (tiers).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 56" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cavea tiers (audience, witnessing) -->
  <path d="M 4 48 A 28 28 0 0 1 60 48" stroke-width="4" />
  <path d="M 12 48 A 20 20 0 0 1 52 48" stroke-width="3" opacity="0.7" />
  <path d="M 20 48 A 12 12 0 0 1 44 48" stroke-width="2.5" opacity="0.42" />
  <!-- Stage floor -->
  <rect x="24" y="46" width="16" height="4" rx="0.5" fill="currentColor" stroke="none" />
  <!-- Flame (yula) rising from stage center —
       asymmetric teardrop with a tapered tip for a natural flame read -->
  <path
    d="M 32 14
       C 27.5 20, 26 25, 28 30
       C 29 33, 31 34, 32 34
       C 33 34, 35 33, 36 30
       C 38 25, 36.5 20, 32 14 Z"
    fill="currentColor" stroke="none" />
  <!-- Inner highlight (negative-space flame core) -->
  <path
    d="M 32 22
       C 30.5 25, 30 28, 31 30.5
       C 31.5 31.5, 32.5 31.5, 33 30.5
       C 34 28, 33.5 25, 32 22 Z"
    fill="var(--bg, #0a0a0a)" stroke="none" opacity="0.9" />
</svg>
