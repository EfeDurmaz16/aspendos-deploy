<!--
  02 v2 — Signet, filled-out
  Outer bold ring + subtle inner concentric ring + 3 inward triangular
  ticks at 90/210/330° + filled center. Reads as a proper wax seal with
  enough density that it doesn't look empty.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer bold ring -->
  <circle cx="32" cy="32" r="25" stroke-width="5" />
  <!-- Inner hairline ring — adds signet depth -->
  <circle cx="32" cy="32" r="17" stroke-width="1.5" opacity="0.55" />
  <!-- Three inward triangular ticks at 90/210/330° (pointing toward center) -->
  <path d="M 28.5 11.5 L 32 17 L 35.5 11.5 Z" fill="currentColor" stroke="none" />
  <path d="M 50.8 44.75 L 45.3 45.25 L 48.3 49.9 Z" fill="currentColor" stroke="none" transform="rotate(120 32 32)" />
  <path d="M 50.8 44.75 L 45.3 45.25 L 48.3 49.9 Z" fill="currentColor" stroke="none" transform="rotate(240 32 32)" />
  <!-- Filled center nucleus -->
  <circle cx="32" cy="32" r="4.5" fill="currentColor" stroke="none" />
</svg>
