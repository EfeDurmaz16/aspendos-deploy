<!--
  YULA — Favicon (16-48px optimized)
  Single-path simplified version for OS chrome. The outer arc is dropped
  at sub-32px sizes — only the filled inner half-circle remains, which
  is still recognizably "the bottom half of the Aspendos mark".
  Background is solid for OS-level rendering (favicon/PWA contexts).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a" />
  <path d="M 6 22 A 10 10 0 0 1 26 22" stroke="#f5f5f5" stroke-width="2.5" stroke-linecap="round" fill="none" />
  <path d="M 10 22 A 6 6 0 0 1 22 22 Z" fill="#FF8A3D" />
</svg>
