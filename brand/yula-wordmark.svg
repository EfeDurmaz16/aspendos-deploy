<!--
  YULA — Wordmark Lockup
  Cavea mark + "yula" lowercase wordmark, Manrope 800 tight kerning.
  Use this for navigation, footer, and any place where brand
  recognition matters more than mark alone.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
  <!-- Mark -->
  <g transform="translate(0, 0)">
    <path d="M 4 40 A 28 28 0 0 1 60 40" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
    <path d="M 12 40 A 20 20 0 0 1 52 40" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.72" />
    <path d="M 20 40 A 12 12 0 0 1 44 40 Z" fill="#FF8A3D" />
  </g>
  <!-- Wordmark -->
  <text x="74" y="38" font-family="Manrope, -apple-system, sans-serif" font-weight="800" font-size="36" letter-spacing="-1.2" fill="currentColor">yula</text>
</svg>
